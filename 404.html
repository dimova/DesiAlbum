<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | DesiAlbum</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #f3f6ff, #eef8f4);
            color: #1f2937;
        }

        .card {
            background: #ffffff;
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            width: min(92vw, 560px);
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 16px;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            background: #0f766e;
            color: #ffffff;
            font-weight: 600;
        }

        a:hover {
            background: #115e59;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>404</h1>
        <p>The page you requested could not be found.</p>
        <a href="./">Back to gallery</a>
    </main>
</body>
</html>
